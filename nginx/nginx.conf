# ══════════════════════════════════════════════════════
#  Nginx Reverse Proxy Configuration
#  Traffic port 80 se FastAPI (port 8000) pe forward karo
# ══════════════════════════════════════════════════════

# Upstream: Gunicorn/FastAPI app
upstream fastapi_app {
    server app:8000;        # Docker Compose network mein "app" service
    keepalive 32;
}

server {
    listen 80;
    server_name _;          # Koi bhi domain/IP accept karo

    # ── File Upload Size ──────────────────────────────
    client_max_body_size 100M;   # 100MB tak audio files allow

    # ── Timeouts (Whisper slow hai) ───────────────────
    proxy_read_timeout    300s;
    proxy_connect_timeout 60s;
    proxy_send_timeout    300s;

    # ── Compression ───────────────────────────────────
    gzip on;
    gzip_types text/plain application/json text/css text/javascript;

    # ── Security Headers ──────────────────────────────
    add_header X-Frame-Options       "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection      "1; mode=block";

    # ── Proxy to FastAPI ──────────────────────────────
    location / {
        proxy_pass         http://fastapi_app;
        proxy_http_version 1.1;

        # Headers forward karo (real IP etc.)
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
    }

    # ── Health Check (Direct, no proxy) ───────────────
    location /nginx-health {
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
