# ══════════════════════════════════════════════════════════════════
#  GitHub Actions - CI/CD Pipeline
#  Trigger: main branch pe push hone pe automatically:
#    1. Docker multi-stage image build karo
#    2. Docker Hub pe push karo
#    3. EC2 pe SSH karke deploy karo
# ══════════════════════════════════════════════════════════════════

name: Build & Deploy Whisper App

on:
  push:
    branches: [ "main" ]        # Sirf main branch pe trigger
  pull_request:
    branches: [ "main" ]        # PR pe sirf build/test, deploy nahi

env:
  DOCKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/whisper-transcription
  IMAGE_TAG: ${{ github.sha }}  # Git commit hash = unique tag

jobs:
  # ────────────────────────────────────────────────────
  # JOB 1: Build & Push Docker Image
  # ────────────────────────────────────────────────────
  build:
    name: 🐳 Build Docker Image
    runs-on: ubuntu-latest

    steps:
      # Step 1: Code checkout
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Docker Buildx setup (multi-platform builds ke liye)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Step 3: Docker Hub login
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Step 4: Docker image build aur push
      - name: Build and Push Image
        uses: docker/build-push-action@v5
        with:
          context: .
          dockerfile: Dockerfile
          target: production          # Multi-stage ka production stage
          push: ${{ github.ref == 'refs/heads/main' }}  # PR pe push mat karo
          tags: |
            ${{ env.DOCKER_IMAGE }}:${{ env.IMAGE_TAG }}
            ${{ env.DOCKER_IMAGE }}:latest
          cache-from: type=gha        # GitHub Actions cache (fast builds)
          cache-to:   type=gha,mode=max

  # ────────────────────────────────────────────────────
  # JOB 2: Deploy to EC2 (sirf main branch pe)
  # ────────────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to EC2
    runs-on: ubuntu-latest
    needs: build                # Build job pass hone ke baad hi chalega
    if: github.ref == 'refs/heads/main'

    steps:
      # Step 1: EC2 pe SSH karke deploy karo
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.EC2_HOST }}         # EC2 Public IP
          username: ${{ secrets.EC2_USER }}         # e.g., ubuntu
          key:      ${{ secrets.EC2_SSH_KEY }}      # Private key (.pem file content)
          port:     22
          script: |
            # ── EC2 pe Docker Hub se latest image pull karo ──
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | \
              docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

            docker pull ${{ env.DOCKER_IMAGE }}:${{ env.IMAGE_TAG }}

            # ── Purana container band karo ──
            docker stop whisper_app 2>/dev/null || true
            docker rm   whisper_app 2>/dev/null || true

            # ── Naya container chalaO ──
            docker run -d \
              --name whisper_app \
              --restart unless-stopped \
              -p 8000:8000 \
              -e WHISPER_MODEL_SIZE=base \
              -e DATABASE_URL=sqlite:////app/data/transcriptions.db \
              -v whisper_db_data:/app/data \
              -v whisper_cache:/root/.cache/whisper \
              ${{ env.DOCKER_IMAGE }}:${{ env.IMAGE_TAG }}

            # ── Cleanup: Purani images delete karo ──
            docker image prune -f

            echo "✅ Deployment complete! Image: ${{ env.IMAGE_TAG }}"

      # Step 2: Deployment verify karo
      - name: Verify Deployment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key:      ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 30 seconds wait karo app start hone ke liye
            sleep 30
            # Health check
            curl -f http://localhost:8000/health || exit 1
            echo "✅ Health check passed!"
